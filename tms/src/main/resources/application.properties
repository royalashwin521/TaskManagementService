spring.application.name=tms
server.port=8082

auth.service.url=http://localhost:8081

# 2. Database Configuration (taskdb schema)
spring.datasource.url=jdbc:postgresql://localhost:5432/taskdb
spring.datasource.username=${DB_USER:tmp_user}
spring.datasource.password=${DB_PASSWORD:tmp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# 4. JWT Security Configuration
jwt.expiration=86400000
# Must be at least 256 bits (32 characters) for HS256
jwt.secret=ILdmZdzxbyQoXZgzJdVVaRa39w4G9BokIRN2TpAQ3WMgrCkHzMcdNEZyNPB3sHdrzQz3ZhoZRh9zRYHFVOc3dg==

# 5. Application Layer Validation
# Enable structured JSON error responses as required
server.error.include-message=always