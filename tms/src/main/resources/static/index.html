<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMP Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" style="max-width: 800px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Task Management Platform</h1>
        <button id="logoutBtn" class="btn btn-outline-danger d-none">Logout</button>
    </div>

    <div id="loginSection" class="card shadow-sm mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <h4 class="card-title text-center mb-4">Please Log In</h4>
            <div id="loginError" class="alert alert-danger d-none"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" id="loginEmail" class="form-control" required placeholder="admin@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="d-none">

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h4 class="card-title">Create New Task</h4>

                <div id="successAlert" class="alert alert-success d-none">Task created successfully!</div>
                <div id="errorAlert" class="alert alert-danger d-none"></div>

                <form id="createTaskForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Project ID</label>
                        <input type="text" id="projectId" class="form-control" placeholder="Paste a Project UUID here">
                        <span id="projectIdError" class="error-text"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Task Title</label>
                        <input type="text" id="taskTitle" class="form-control" placeholder="Enter task title">
                        <span id="titleError" class="error-text"></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Priority</label>
                        <select id="taskPriority" class="form-select">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Save Task</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-3">Task List</h4>
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Title</th>
                        <th>Priority</th>
                        <th>Status (Click to change)</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="taskTableBody">
                    </tbody>
                </table>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <button id="prevBtn" class="btn btn-outline-secondary" disabled>Previous</button>
                    <span id="pageIndicator" class="fw-bold text-muted">Page 1 of 1</span>
                    <button id="nextBtn" class="btn btn-outline-secondary" disabled>Next</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
